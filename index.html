<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaazh Crochet - Handmade with Love</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Yaazh Crochet Logo" class="logo">
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <h1>Handmade Crochet Wonders</h1>
        <p>Unique, high-quality crochet items made just for you.</p>
        <a href="https://www.instagram.com/yaazh_crochet" class="cta-button">Visit Instagram</a>
    </section>

    <section id="products" class="gallery">
        <h2>Our Creations</h2>
        <div class="product-grid">
            <div class="product-card">
                <img src="flower.jpg" alt="Crochet Flower">
                <p>Beautiful Crochet Flowers</p>
            </div>
            <div class="product-card">
                <img src="keychain.jpg" alt="Crochet Keychain">
                <p>Custom Keychains</p>
            </div>
            <div class="product-card">
                <img src="toys.jpg" alt="Crochet Toys">
                <p>Adorable Amigurumi Toys</p>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Yaazh Crochet. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
